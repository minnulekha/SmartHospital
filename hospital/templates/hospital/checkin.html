<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background: #f0f2f5; }
        .card-booking { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .booking-header { background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); padding: 40px; color: white; text-align: center; }
        .input-group-text { border-right: none; }
        .form-control, .form-select { border-left: none; }
        .form-control:focus, .form-select:focus { box-shadow: none; border-color: #dee2e6; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card card-booking">
                    <div class="booking-header">
                        <i class="fas fa-calendar-check fa-3x mb-3"></i>
                        <h3 class="fw-bold">Book Appointment</h3>
                        <p class="mb-0 opacity-75">Select a department to find a doctor</p>
                    </div>
                    
                    <div class="card-body p-4 p-md-5 bg-white">
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted small">EMAIL ADDRESS</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                                    {{ form.patient_email }}
                                </div>
                                <div class="form-text" style="font-size: 0.7rem;">Use your Google email to track history.</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted small">PATIENT NAME</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                                    {{ form.patient_name }}
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted small">DEPARTMENT</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-building text-muted"></i></span>
                                    <select id="department-select" class="form-select" required>
                                        <option value="">-- Select Department --</option>
                                        {% for dept in departments %}
                                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted small">AVAILABLE DOCTOR</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-user-md text-muted"></i></span>
                                    <select id="id_doctor" name="doctor" class="form-select" disabled required>
                                        <option value="">-- First Select Department --</option>
                                    </select>
                                </div>
                                <div id="doctor-status" class="form-text text-danger mt-2" style="display:none;">
                                    <i class="fas fa-exclamation-circle"></i> No doctors currently on duty.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm" id="submit-btn" disabled>
                                Confirm Booking <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="text-muted text-decoration-none small">
                        <i class="fas fa-chevron-left me-1"></i> Back to Home
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('#department-select').change(function() {
                var deptId = $(this).val();
                var doctorSelect = $('#id_doctor');
                var submitBtn = $('#submit-btn');
                
                doctorSelect.empty().append('<option value="">Loading...</option>').prop('disabled', true);
                submitBtn.prop('disabled', true);
                $('#doctor-status').hide();

                if (deptId) {
                    $.ajax({
                        url: '{% url "get_doctors" %}',
                        data: { 'department_id': deptId },
                        success: function(data) {
                            doctorSelect.empty();
                            if (data.doctors.length > 0) {
                                doctorSelect.append('<option value="">-- Select Doctor --</option>');
                                data.doctors.forEach(function(doc) {
                                    doctorSelect.append('<option value="' + doc.id + '">Dr. ' + doc.user__first_name + ' ' + doc.user__last_name + '</option>');
                                });
                                doctorSelect.prop('disabled', false);
                            } else {
                                doctorSelect.append('<option value="">No Doctors Available</option>');
                                $('#doctor-status').show();
                            }
                        }
                    });
                }
            });

            $('#id_doctor').change(function() {
                $('#submit-btn').prop('disabled', !$(this).val());
            });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPZUgQM99l10PBbx0nXg4SuIZ_dhXp2Q4",
            authDomain: "smarthospital-63b2c.firebaseapp.com",
            projectId: "smarthospital-63b2c",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const nameField = document.querySelector('input[name="patient_name"]');
                const emailField = document.querySelector('input[name="patient_email"]');
                
                if(nameField && !nameField.value) nameField.value = user.displayName;
                if(emailField && !emailField.value) {
                    emailField.value = user.email;
                    emailField.readOnly = true; 
                }
            }
        });
    </script>
</body>
</html>
